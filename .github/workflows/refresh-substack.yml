name: Refresh Substack posts

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh posts.json
        run: node scripts/refresh-substack.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet -- posts.json; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add posts.json
          git commit -m "chore: refresh Substack posts"
          git push
