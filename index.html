<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bill's Portfolio</title>
<link rel="icon" type="image/png" href="assets/onion.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<script>
  (function () {
    try {
      var t = localStorage.getItem("theme");
      if (t === "light" || t === "dark") {
        document.documentElement.setAttribute("data-theme", t);
      }
    } catch (e) {}
  })();
</script>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components/Header.jsx"></script>
<script type="text/babel" src="components/Intro.jsx"></script>
<script type="text/babel" src="components/Hero.jsx"></script>
<script type="text/babel" src="components/About.jsx"></script>
<script type="text/babel" src="components/Projects.jsx"></script>
<script type="text/babel" src="components/Publications.jsx"></script>
<script type="text/babel" src="components/Experience.jsx"></script>
<script type="text/babel" src="components/Writing.jsx"></script>
<script type="text/babel" src="components/Content.jsx"></script>
<script type="text/babel" src="components/Contact.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#2D4A3E",
  "hero": "editorial",
  "bg": "warm",
  "intro": true
}/*EDITMODE-END*/;

function App() {
  const [settings, setSettings] = useState(TWEAK_DEFAULTS);
  const [introDone, setIntroDone] = useState(!TWEAK_DEFAULTS.intro || sessionStorage.getItem("introShown"));

  useEffect(() => {
    document.documentElement.style.setProperty("--accent", settings.accent);
    document.documentElement.style.setProperty(
      "--accent-soft",
      settings.accent === "#1a1a1a"
        ? "rgba(26,26,26,0.08)"
        : hexToSoft(settings.accent)
    );
    document.documentElement.setAttribute("data-bg", settings.bg);
  }, [settings]);

  useEffect(() => {
    if (settings.intro && !sessionStorage.getItem("introShown")) {
      const t = setTimeout(() => {
        sessionStorage.setItem("introShown", "1");
        setIntroDone(true);
      }, 2400);
      return () => clearTimeout(t);
    }
  }, []);

  useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") {
        e.preventDefault();
        const root = document.documentElement;
        const current = root.getAttribute("data-theme");
        const osDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const effective = current || (osDark ? "dark" : "light");
        const next = effective === "dark" ? "light" : "dark";
        root.setAttribute("data-theme", next);
        try { localStorage.setItem("theme", next); } catch (err) {}
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  return (
    <>
      {settings.intro && !introDone && <Intro />}
      <Header />
      <main className="page">
        <Hero />
        <About />
        <Projects />
        <Publications />
        <Experience />
        <Writing />
        <Content />
        <Contact />
      </main>
    </>
  );
}

function hexToSoft(hex) {
  const m = hex.replace("#","");
  const r = parseInt(m.slice(0,2),16), g = parseInt(m.slice(2,4),16), b = parseInt(m.slice(4,6),16);
  return `rgba(${r},${g},${b},0.12)`;
}

setTimeout(() => {
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
}, 50);
</script>
</body>
</html>
